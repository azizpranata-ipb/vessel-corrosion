services:
  corrosion-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ship-corrosion-yolo:latest
    container_name: corrosion-api
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
      - ./outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
